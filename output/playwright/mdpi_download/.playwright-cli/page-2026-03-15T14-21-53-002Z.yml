                            - listitem [ref=e1690]:
                              - generic [ref=e1691]: "Consistency trends: We track consistency values to understand how adaptive dataset augmentation addresses disagreement among models."
                          - generic [ref=e1692]: Comparison to baseline
                          - generic [ref=e1693]: "Our approach introduces several key changes to the baseline:"
                          - list [ref=e1695]:
                            - listitem [ref=e1696]:
                              - generic [ref=e1697]:
                                - text: "Dynamic weighting: While the baseline treats all models equally, we dynamically adjust weights based on batch-wise error rates ["
                                - link "33" [ref=e1698] [cursor=pointer]:
                                  - /url: "#B33-applsci-15-03676"
                                - text: "]."
                            - listitem [ref=e1699]:
                              - generic [ref=e1700]: "Consistency metrics: Unlike the baseline, we calculate and utilize consistency to identify disagreements and guide adaptive augmentation."
                            - listitem [ref=e1701]:
                              - generic [ref=e1702]:
                                - text: "Dataset augmentation: The baseline relies solely on pre-existing responses, whereas we actively retrieve and integrate additional context from the dataset, inspired by recent work on dynamic retrieval ["
                                - link "36" [ref=e1703] [cursor=pointer]:
                                  - /url: "#B36-applsci-15-03676"
                                - text: "]."
                          - generic [ref=e1704]: These changes make the debate process more adaptive and performance-driven, improving the overall accuracy and consistency of model outputs.
                      - generic [ref=e1705]:
                        - heading "4.3. Summary of Results" [level=3] [ref=e1706]
                        - generic [ref=e1707]:
                          - text: The experimental results demonstrate the effectiveness of the proposed multi-model collaboration framework in improving accuracy and reducing hallucinations. The composite accuracy, as shown in
                          - link "Figure 2" [ref=e1708] [cursor=pointer]:
                            - /url: "#fig_body_display_applsci-15-03676-f002"
                          - text: ", exhibits a steady upward trend across 20 batches of evaluations. This indicates that the dynamic weighting mechanism effectively adjusts the influence of each model, ensuring that the system leverages the strengths of high-performing models while mitigating the impact of less reliable ones."
                        - generic [ref=e1709]:
                          - generic [ref=e1711] [cursor=pointer]:
                            - img "Applsci 15 03676 g002" [ref=e1712]
                            - link [ref=e1713]:
                              - /url: "#fig_body_display_applsci-15-03676-f002"
                          - generic [ref=e1714]: Figure 2. Composite accuracy across 20 evaluation batches. The steady increase highlights the effectiveness of dynamic weighting.
                        - generic [ref=e1715]: One of the most significant observations is the stability of the improvement trajectory, suggesting that the system’s learning and adaptation mechanisms are robust to minor fluctuations in model performance. For instance, Model 3 consistently contributed the most due to its lower historical error rate, which was effectively reflected in its higher weight throughout the experiment. However, Models 1 and 2 showed variability in their contributions, highlighting the system’s ability to adapt dynamically based on real-time performance data.
                      - generic [ref=e1716]:
                        - heading "4.4. Performance of Evaluation Metrics" [level=3] [ref=e1717]
                        - generic [ref=e1718]: The evaluation metrics used in this study played a critical role in assessing and optimizing system performance. Among these, the most impactful was the **weighted consistency metric**, which served as an indicator of agreement among model outputs. Higher consistency values directly correlated with improvements in composite accuracy, as they reflected better alignment among models in their predictions.
                        - generic [ref=e1719]:
                          - link "Figure 3" [ref=e1720] [cursor=pointer]:
                            - /url: "#fig_body_display_applsci-15-03676-f003"
                          - text: illustrates the dynamic adjustment of model weights across 20 batches. Model 3 consistently maintained the highest weight due to its superior historical performance, while Model 1 exhibited significant fluctuations in weight. This dynamic adjustment mechanism ensured that the system prioritized models with higher reliability, thereby enhancing overall accuracy. The logarithmic weight update formula amplified this effect, providing a balance between responsiveness to performance changes and stability in model contributions.
                        - generic [ref=e1721]:
                          - generic [ref=e1723] [cursor=pointer]:
                            - img "Applsci 15 03676 g003" [ref=e1724]
                            - link [ref=e1725]:
                              - /url: "#fig_body_display_applsci-15-03676-f003"
                          - generic [ref=e1726]: Figure 3. Dynamic weight adjustments for three models across 20 batches. Model 3 consistently maintained the highest weight due to its lower historical error rate.
                        - generic [ref=e1727]: Another important observation was the interplay between weight distribution and consistency. When weights were too heavily skewed toward a single model, consistency values dropped, leading to a temporary decline in system accuracy. This underscores the need for balanced contributions from multiple models to achieve optimal collaboration. Adjusting the weight decay rate and thresholds for updates could further improve the system’s ability to maintain high consistency without compromising individual model contributions.
                      - generic [ref=e1728]:
                        - heading "4.5. Analysis of Experiment Results" [level=3] [ref=e1729]
                        - generic [ref=e1730]:
                          - text: The performance comparison presented in
                          - link "Table 1" [ref=e1731] [cursor=pointer]:
                            - /url: "#table_body_display_applsci-15-03676-t001"
                          - text: highlights key trends and insights that are critical for understanding the impact of model configurations and datasets on task performance. Here, we delve deeper into the experimental conclusions drawn from the observed performance metrics, particularly for the ‘mmlu’ dataset, which serves as the benchmark for evaluating large language models.
                        - generic [ref=e1732]:
                          - generic [ref=e1733]: Table 1. Performance comparison across different tasks and models.
                          - generic [ref=e1735] [cursor=pointer]:
                            - img [ref=e1736]
                            - link [ref=e1737]:
                              - /url: "#table_body_display_applsci-15-03676-t001"
                      - generic [ref=e1738]:
                        - heading "4.6. Dataset and Model Configuration" [level=3] [ref=e1739]
                        - generic [ref=e1740]: "mmluMIT vs./ mmluD: The comparison between “mmluMIT” and “mmluD” shows that the MIT-based models generally outperform the domestic group models, particularly in the initial performance evaluations. For instance, the first performance metric for “mmluMIT” is 0.48, compared to 0.40 for “mmluD”. This suggests that the MIT baseline models are more effective at solving tasks related to the mmlu dataset, likely due to their more extensive training and higher-quality development environment."
                        - generic [ref=e1741]: The performance of the domestic models (mmluD) improves in the second and third evaluations, particularly in the “mmlu-cotD” configuration, which uses chain-of-thought reasoning. The domestic models seem to benefit from this reasoning framework, showing that while they start with a lower baseline, they can perform comparably to the MIT models when given a more complex reasoning task. This finding could imply that with further refinement in their design, domestic models could eventually match or even surpass their MIT counterparts in certain domains.
                      - generic [ref=e1742]:
                        - heading "4.7. Chain-of-Thought (cot) Mechanism" [level=3] [ref=e1743]
                        - generic [ref=e1744]: Incorporating chain-of-thought reasoning (denoted by the “cot” suffix) has a noticeable effect on performance. For both “mmlu” and “gsm” datasets, models using the cot mechanism (“mmlu-cotD”, “gsm-cotD”) show higher consistency across different performance evaluations compared to models without it. This highlights the value of integrating logical reasoning steps into the model’s decision-making process, suggesting that more complex tasks benefit from such structured thought processes.
                      - generic [ref=e1745]:
                        - heading "4.8. Impact of Model Grouping (Domestic vs. MIT)" [level=3] [ref=e1746]
                        - generic [ref=e1747]: The comparison between domestic models (denoted as “D”) and MIT baseline models (denoted as “MIT”) reveals that MIT models have an inherent advantage in terms of performance, particularly in the early stages of evaluation. However, the “mmlu-cotD” and “gsm-cotD” models show improved results as they use chain-of-thought reasoning, demonstrating that domestic models have potential if enhanced with advanced reasoning frameworks.
                      - generic [ref=e1748]:
                        - heading "4.9. Performance Stability and Adaptation" [level=3] [ref=e1749]
                        - generic [ref=e1750]: One notable feature in the table is the consistent performance across batches for models like “mmluMIT”. The MIT-based models maintain relatively stable performance, reflecting their robust baseline development. On the other hand, models like “mmluD” exhibit more variability, particularly in tasks without chain-of-thought reasoning. This suggests that the domestic group models may be more sensitive to changes in input complexity and that their performance could be further improved through more dynamic training methods and model fine-tuning.
                      - generic [ref=e1751]:
                        - heading "4.10. Ablation Study Analysis" [level=3] [ref=e1752]
                        - generic [ref=e1753]:
                          - text: To further analyze the impact of different components on model performance, we conducted an ablation study on the mmlu task, as shown in the last section of
                          - link "Table 1" [ref=e1754] [cursor=pointer]:
                            - /url: "#table_body_display_applsci-15-03676-t001"
                          - text: . Specifically, we examined the effect of removing the weighting mechanism (without weighting) and removing the consistency metrics (without consistency metrics) on model performance.
                        - generic [ref=e1755]: The results indicate that **removing the weighting mechanism and consistency metrics did not affect the first performance and second performance**, both remaining at 0.40 and 0.00, respectively. However, in terms of the third performance metric, the performance values decreased to 0.53 and 0.54 after removing the weighting mechanism and consistency metrics, respectively, whereas the complete model (mmluD) achieved 0.55. Furthermore, when combined with chain-of-thought (mmlu-cotD), the performance further improved to 0.60. This suggests that **both the weighting mechanism and consistency metrics positively contribute to the final performance**, particularly in the third performance evaluation.
                        - generic [ref=e1756]: Overall, **the weighting mechanism and consistency metrics play a crucial role in improving model performance**. The ablation study results demonstrate that their contributions are primarily reflected in the third performance metric, with relatively little impact on the first and second performances. These findings further validate the effectiveness of our approach and highlight the importance of these mechanisms in enhancing the model’s reasoning capability.
                      - generic [ref=e1757]:
                        - heading "4.11. Insights for Future Work" [level=3] [ref=e1758]
                        - generic [ref=e1759]: "Expanding the dataset: Future research could investigate expanding the scope of the “mmlu” and “gsm” datasets to include more diverse and challenging tasks. This would allow for a deeper understanding of how different models perform under varying conditions and task complexities."
                    - generic [ref=e1760]:
                      - heading "5. Conclusions" [level=2] [ref=e1761]
                      - generic [ref=e1762]: In this paper, we propose a multi-agent framework to address hallucinations in large language models. Our approach combines repetitive inquiries, adversarial debates, error logs, and voting mechanisms to reduce hallucinations and improve accuracy. We also introduce entropy compression techniques to optimize communication efficiency, minimizing both dialogue rounds and response time.
                      - generic [ref=e1763]: The results demonstrate that our system significantly reduces hallucinations and enhances the reliability and efficiency of LLMs. The combination of self-correction mechanisms and cross-validation between multiple models improves consistency and robustness.
                      - generic [ref=e1764]: "While our experimental results demonstrate the effectiveness of the proposed approach, several limitations should be noted:"
                      - generic [ref=e1765]: "1. Lack of multi-machine communication scenarios: Our experiments were conducted in a single-machine environment, and we did not account for the complexities of multi-machine communication, such as network latency, synchronization issues, or bandwidth constraints. These factors could significantly impact performance in real-world distributed systems."
                      - generic [ref=e1766]: "2. Failure and downtime scenarios: The current framework does not consider potential failures or the downtime of individual models or agents. In practical applications, fault tolerance and recovery mechanisms would be essential to ensure robustness and continuity."
                      - generic [ref=e1767]: "3. Limited dataset and task coverage: Due to time and resource constraints (27 h per batch), our evaluation was primarily focused on a subset of datasets and tasks (e.g., MMLU). A more comprehensive analysis across diverse datasets and tasks would strengthen the generalizability of our findings."
                      - generic [ref=e1768]: "4. Scalability concerns: The scalability of the proposed approach to larger-scale systems with hundreds or thousands of agents remains untested. Future work should explore the performance and efficiency of the framework in such scenarios."
                      - generic [ref=e1769]: Addressing these limitations in future research will be critical to advancing the practical applicability and robustness of the proposed approach. Future work could explore incorporating more diverse models and datasets, as well as integrating human evaluators for further validation. Overall, our approach lays the foundation for building more trustworthy and efficient LLM-based systems in critical applications.
