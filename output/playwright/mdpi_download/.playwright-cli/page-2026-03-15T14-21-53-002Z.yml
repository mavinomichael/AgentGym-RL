                    - generic [ref=e255]:
                      - heading "1. Introduction" [level=2] [ref=e256]
                      - generic [ref=e257]:
                        - text: Large language models (LLMs), such as Claude or GPT series [
                        - link "1" [ref=e258] [cursor=pointer]:
                          - /url: "#B1-applsci-15-03676"
                        - text: ","
                        - link "2" [ref=e259] [cursor=pointer]:
                          - /url: "#B2-applsci-15-03676"
                        - text: ","
                        - link "3" [ref=e260] [cursor=pointer]:
                          - /url: "#B3-applsci-15-03676"
                        - text: "], represent a new era for AI technology. GPT-4 ["
                        - link "4" [ref=e261] [cursor=pointer]:
                          - /url: "#B4-applsci-15-03676"
                        - text: "], for example, can understand long text inputs, interpret input images, and generate text or image feedback in very complex scenarios. Given the ability to understand complex query intent and solve general natural language tasks, including some domain-specific tasks, some researchers believe that large language models have the potential to evolve into general artificial intelligence ["
                        - link "5" [ref=e262] [cursor=pointer]:
                          - /url: "#B5-applsci-15-03676"
                        - text: "]."
                      - generic [ref=e263]:
                        - text: In scenarios such as healthcare and military operations, which require fast and accurate dialogue and environmental responses, LLMs are considered effective and convenient tools [
                        - link "6" [ref=e264] [cursor=pointer]:
                          - /url: "#B6-applsci-15-03676"
                        - text: ","
                        - link "7" [ref=e265] [cursor=pointer]:
                          - /url: "#B7-applsci-15-03676"
                        - text: "]. However, in these application scenarios, the accuracy of LLMs is crucial, as any errors can lead to serious consequences. For example, in healthcare, an incorrect response could lead to a wrong treatment suggestion, putting the patient at risk; in military operations, misinterpreting information could lead to poor decisions; and in legal cases, wrong information could unfairly influence the outcome."
                      - generic [ref=e266]:
                        - text: Hallucinations in LLMs refer to cases where the model automatically generates responses that contain false information or are non-factual [
                        - link "8" [ref=e267] [cursor=pointer]:
                          - /url: "#B8-applsci-15-03676"
                        - text: "]. These issues can have serious consequences in scenarios that rely heavily on accuracy. While some efforts have been made to address hallucinations—such as repeated questioning, where the model is asked the same question multiple times, and cross-model comparison, where multiple models with different training backgrounds provide answers—the problem remains far from fully resolved. Existing methods often struggle to generalize across different tasks or provide consistent results, leaving room for improvement in detecting and reducing hallucinations effectively."
                      - generic [ref=e268]: In addition to accuracy concerns, dialogue efficiency plays a critical role in LLM applications, especially in time-sensitive or resource-constrained scenarios such as military operations or emergency medical consultations. Excessive dialogue rounds not only lead to increased computational costs but also risk amplifying hallucinations by introducing more opportunities for the model to generate non-factual responses. Therefore, reducing unnecessary dialogue rounds is essential to ensure both operational efficiency and response reliability in LLM interactions.
                      - generic [ref=e269]: "This paper aims to address the hallucination issue of LLMs by introducing adversarial and voting mechanisms in multi-agent LLMs. Specifically, we propose a multi-agent LLM framework that incorporates repetitive inquiries and error logs within a single LLM, as well as adversarial debates between multiple LLMs. The voting mechanism is embedded in this adversarial debate to determine the necessity of conducting some external knowledge retrieval. Moreover, we employ entropy compression to minimize the number of conversational tokens and turns, in order to handle tasks that are sensitive to communication efficiency. Finally, we use multiple evaluation metrics to evaluate the performance of the proposed method, including the hallucination reduction rate, the total number of conversational tokens, and the task completion time. Our contributions are as follows:"
                      - list [ref=e271]:
                        - listitem [ref=e272]:
                          - generic [ref=e273]: We propose a multi-agent LLM framework with adversarial and voting mechanisms to detect and reduce hallucinations. In this framework, first, we use repetitive inquiries and error logs to reduce hallucinatory responses for a single LLM. The adversarial debates and voting mechanisms are used to determine whether to retrieve external help to correct the hallucinations.
                        - listitem [ref=e274]:
                          - generic [ref=e275]: We introduce the entropy compression technique to minimize the number of conversational tokens for tasks that are sensitive to communication efficiency.
                        - listitem [ref=e276]:
                          - generic [ref=e277]: We assess the framework’s performance by evaluating various metrics, including the hallucination reduction rate, the total number of conversational tokens, and task completion time.
                      - generic [ref=e278]:
                        - text: The remainder of this paper is organized as follows.
                        - link "Section 2" [ref=e279] [cursor=pointer]:
                          - /url: "#sec2-applsci-15-03676"
                        - text: presents related works.
                        - link "Section 3" [ref=e280] [cursor=pointer]:
                          - /url: "#sec3-applsci-15-03676"
                        - text: presents our proposed methodology, including the system architecture and key techniques.
                        - link "Section 4" [ref=e281] [cursor=pointer]:
                          - /url: "#sec4-applsci-15-03676"
                        - text: describes the experimental design, implementation details, and results. Finally,
                        - link "Section 5" [ref=e282] [cursor=pointer]:
                          - /url: "#sec5-applsci-15-03676"
                        - text: presents the conclusion.
                    - generic [ref=e283]:
                      - heading "2. Related Work" [level=2] [ref=e284]
                      - generic [ref=e285]:
                        - heading "2.1. Generative AI Models and Foundation Models" [level=3] [ref=e286]
                        - generic [ref=e287]:
                          - text: Generative AI models are a class of machine learning models designed to generate new data that closely resemble the distribution of the original data. [
                          - link "9" [ref=e288] [cursor=pointer]:
                            - /url: "#B9-applsci-15-03676"
                          - text: "] The initial AI content generation technology gained attention around the year 2015 ["
                          - link "10" [ref=e289] [cursor=pointer]:
                            - /url: "#B10-applsci-15-03676"
                          - text: ","
                          - link "11" [ref=e290] [cursor=pointer]:
                            - /url: "#B11-applsci-15-03676"
                          - text: "]. In addition to generating conversational text, this type of AI technology started to generate multimodal content, such as images ["
                          - link "12" [ref=e291] [cursor=pointer]:
                            - /url: "#B12-applsci-15-03676"
                          - text: ","
                          - link "13" [ref=e292] [cursor=pointer]:
                            - /url: "#B13-applsci-15-03676"
                          - text: "] and videos ["
                          - link "14" [ref=e293] [cursor=pointer]:
                            - /url: "#B14-applsci-15-03676"
                          - text: "]. Typical methods for generating AI models include the Gaussian mixture model, hidden Markov model, latent Dirichlet allocation, Boltzmann machine, variational autoencoder, generative adversarial network ["
                          - link "12" [ref=e294] [cursor=pointer]:
                            - /url: "#B12-applsci-15-03676"
                          - text: "], etc."
                        - generic [ref=e295]:
                          - text: Foundation models represent a paradigm shift in AI based on the progress of generative models. As defined by Bommasani et al. [
                          - link "15" [ref=e296] [cursor=pointer]:
                            - /url: "#B15-applsci-15-03676"
                          - text: "], foundation models are trained on large and extensive amounts of data and are adaptable to a variety of downstream tasks by fine-tuning. Foundation models are seen as incomplete but critical building blocks that are adaptable and serve specific tasks. However, this adaptability may also cause hallucinations when the models deal with unclear or confusing input. This highlights the need for robust mechanisms to detect and reduce hallucinations in foundation models."
                      - generic [ref=e297]:
                        - heading "2.2. Large Language Models" [level=3] [ref=e298]
                        - generic [ref=e299]: Large language models have seen rapid advancements, evolving from task-specific fine-tuning models to versatile systems capable of general and domain-specific tasks. In August 2024, the ChatGPT platform (ChatGPT 4o, 4 Turbo,4o with Canvas) had 180.5 million registered users. Microsoft’s Bing AI(v28.5.2110003549) had approximately 100 million daily active users. At the same time, Anthropic’s Claude AI had millions of daily active users.
                        - generic [ref=e300]:
                          - text: The GPT series plays an important role in the area of large language models. In June 2018, the GPT-1 model [
                          - link "1" [ref=e301] [cursor=pointer]:
                            - /url: "#B1-applsci-15-03676"
                          - text: "], with 117 million parameters, was introduced. The model was based on the Transformer framework and trained using unsupervised learning methods. Fine-tuning was required to achieve downstream tasks. In February 2019, the GPT-2 model ["
                          - link "2" [ref=e302] [cursor=pointer]:
                            - /url: "#B2-applsci-15-03676"
                          - text: "], with 1.5 billion parameters, was able to achieve multi-task learning and did not require fine-tuning on some supervised subtasks. GPT-3 ["
                          - link "3" [ref=e303] [cursor=pointer]:
                            - /url: "#B3-applsci-15-03676"
                          - text: "] had 175 billion parameters; the model had better generalization ability and performed well in various downstream tasks. The InstructGPT (used in GPT3.5) ["
                          - link "16" [ref=e304] [cursor=pointer]:
                            - /url: "#B16-applsci-15-03676"
                          - text: "] version introduced reinforcement learning with human feedback (RLHF). The public version of ChatGPT was released to the public at the end of 2022; two months later, it reached 100 million monthly active users. GPT-4 ["
                          - link "4" [ref=e305] [cursor=pointer]:
                            - /url: "#B4-applsci-15-03676"
                          - text: "], released in March 2023, has evolved into a large multimodal model that can accept image and text inputs. GPT-4 performs at the same level as humans on many benchmarks ["
                          - link "17" [ref=e306] [cursor=pointer]:
                            - /url: "#B17-applsci-15-03676"
                          - text: "]."
                      - generic [ref=e307]:
                        - heading "2.3. Hallucination Problem in Large Language Models" [level=3] [ref=e308]
                        - generic [ref=e309]:
                          - text: Hallucinations [
                          - link "18" [ref=e310] [cursor=pointer]:
                            - /url: "#B18-applsci-15-03676"
                          - text: "] in large language models (LLMs) refer to cases where the models generate incorrect or meaningless outputs. Researchers have categorized hallucinations into the following six types: acronym ambiguity, numeric nuisance, generated golem, virtual voice, geographic erratum, and time warp ["
                          - link "19" [ref=e311] [cursor=pointer]:
                            - /url: "#B19-applsci-15-03676"
                          - text: "]. Although existing research has explored various techniques to detect and mitigate these hallucinations, challenges remain due to the complexity of LLMs and their training data."
                        - generic [ref=e312]:
                          - text: Hallucinations originate from three stages, namely, data collection, training, and inference. First, in the data collection stage, the training data may be of low quality and inconsistent. There may be erroneous and outdated data, and there may also be potential bias in the training data. In the training stage, the attention mechanism in the Transformer architecture cannot handle sequences that are too long. In the inference stage, there are differences between the training data and the inference data, and the randomness of sampling leads to the generation of meaningless response content. These are all possible causes of hallucinations [
                          - link "18" [ref=e313] [cursor=pointer]:
                            - /url: "#B18-applsci-15-03676"
                          - text: "]."
                        - generic [ref=e314]:
                          - text: Two types of hallucinations can potentially be triggered in large language models that incorporate external knowledge, such as knowledge graphs, namely, extrinsic hallucinations and intrinsic hallucinations. The former is easier to detect, characterized by the model responding with facts that do not exist in the knowledge graph, and its induction is mainly due to the system’s text spans; the latter is characterized by the model making incorrect references to content in the knowledge graph, and its induction is mainly due to the system’s incorrect associations [
                          - link "20" [ref=e315] [cursor=pointer]:
                            - /url: "#B20-applsci-15-03676"
                          - text: "]."
                      - generic [ref=e316]:
                        - heading "2.4. Approaches to Deal with the Hallucination Problem" [level=3] [ref=e317]
                        - generic [ref=e318]:
                          - text: Detecting hallucinations in LLM to enhance model performance is crucial to avoid misinformation, ensure factual consistency, and protect user trust and information security [
                          - link "21" [ref=e319] [cursor=pointer]:
                            - /url: "#B21-applsci-15-03676"
                          - text: "]. Currently, there are some datasets dedicated to the hallucination phenomenon in LLMs, such as HaluEval Datasets ["
                          - link "22" [ref=e320] [cursor=pointer]:
                            - /url: "#B22-applsci-15-03676"
                          - text: "]."
                        - generic [ref=e321]:
                          - text: As LLMs become prevalent in critical fields, such as education, scientific research, and the military, the accuracy of LLM responses is more paramount. It is important to propose more effective strategies for mitigating LLM hallucinations. In the latest LLM hallucination mitigation research, several solutions have been proposed, including identifying high-entropy words in generated text and replacing them with words that have a lower (HVI); scoring sentences in generated text and conducting manual reviews of low-scoring sentences; reranking and beam search improvements, etc. [
                          - link "19" [ref=e322] [cursor=pointer]:
                            - /url: "#B19-applsci-15-03676"
                          - text: "]."
                        - generic [ref=e323]:
                          - text: In addition to reducing the toxicity of hallucinations in individual LLMs, the use of multiple LLM agents has also begun to receive attention due to their effectiveness in mitigating hallucinations. The term “multi-agent” in LLMs refers to multiple LLM agents, which are employed to debate with each other to solve complex tasks. When multiple agents are asked to respond to the same prompt—if one agent experiences hallucinations, other agents can cross-verify the response information and provide alternative responses. And, the degeneration-of-thought (DoT) problem occurs when the single LLM is confident in its initial answer and cannot generate new ideas through self-reflection, even if the initial answer is incorrect. By having multiple agents with different perspectives, this architecture could challenge the perspectives of other agents and attempt to avoid DoT [
                          - link "23" [ref=e324] [cursor=pointer]:
                            - /url: "#B23-applsci-15-03676"
                          - text: ","
                          - link "24" [ref=e325] [cursor=pointer]:
                            - /url: "#B24-applsci-15-03676"
                          - text: "]."
                      - generic [ref=e326]:
                        - heading "2.5. System Optimization for Reducing Dialogue Rounds" [level=3] [ref=e327]
                        - generic [ref=e328]: The optimization of dialogue systems to minimize the number of interaction rounds has received some attention in the field of natural language processing (NLP). Although not a dominant research area, efforts in this direction aim to enhance efficiency by reducing redundant conversational turns while complementing the primary goal of generating coherent and contextually relevant responses.
                        - generic [ref=e329]:
                          - text: One line of research explores reinforcement learning (RL) for dialogue policy optimization. For instance, studies such as those leveraging deep Q-networks (DQNs) [
                          - link "25" [ref=e330] [cursor=pointer]:
                            - /url: "#B25-applsci-15-03676"
                          - text: "] aim to identify optimal strategies for task-oriented dialogues. These approaches reward concise and effective interactions, guiding the system to achieve the desired outcome in fewer turns ["
                          - link "26" [ref=e331] [cursor=pointer]:
                            - /url: "#B26-applsci-15-03676"
                          - text: ","
                          - link "27" [ref=e332] [cursor=pointer]:
                            - /url: "#B27-applsci-15-03676"
                          - text: "]. Reinforcement learning frameworks often incorporate reward shaping to penalize unnecessary dialogue steps, thereby fostering more efficient exchanges. However, applying RL to modern large-scale language models like GPT and BERT-based architectures is challenging due to the substantial computational resources required and the complexity of training such models. The high cost of reinforcement learning optimization in these advanced systems highlights the need for more efficient methodologies."
                        - generic [ref=e333]:
                          - text: Another strategy focuses on improving dialogue state tracking and response generation. Enhanced state tracking mechanisms allow the system to maintain a more accurate representation of user intent and conversation history, reducing errors and misunderstandings that can lead to prolonged interactions [
                          - link "28" [ref=e334] [cursor=pointer]:
                            - /url: "#B28-applsci-15-03676"
                          - text: "]. Meanwhile, advancements in pre-trained language models, such as GPT and BERT-based architectures, enable better contextual understanding and response formulation, indirectly contributing to fewer dialogue rounds ["
                          - link "3" [ref=e335] [cursor=pointer]:
                            - /url: "#B3-applsci-15-03676"
                          - text: ","
                          - link "29" [ref=e336] [cursor=pointer]:
                            - /url: "#B29-applsci-15-03676"
                          - text: "]. However, for scenarios where computational resources are limited, optimizing existing model architectures rather than pursuing entirely new and resource-intensive designs remains a highly valuable approach."
                    - generic [ref=e337]:
                      - heading "3. Methodology" [level=2] [ref=e338]
                      - generic [ref=e339]:
                        - heading "3.1. System Architecture" [level=3] [ref=e340]
                        - generic [ref=e341]:
                          - text: The proposed system integrates multiple complementary components to detect and reduce hallucinations in large language models (LLMs), as shown in
                          - link "Figure 1" [ref=e342] [cursor=pointer]:
                            - /url: "#fig_body_display_applsci-15-03676-f001"
                          - text: . The algorithm is shown in Algorithm 1. At its core, the architecture relies on a collaborative framework where multiple LLMs operate in tandem to evaluate and validate responses. Each LLM independently engages in repetitive inquiries by answering the same query multiple times, aiming to identify inconsistencies and potential hallucinations through repetitive questioning.
                        - generic [ref=e343]:
                          - generic [ref=e345] [cursor=pointer]:
                            - img "Applsci 15 03676 g001" [ref=e346]
                            - link [ref=e347]:
                              - /url: "#fig_body_display_applsci-15-03676-f001"
                          - generic [ref=e348]: Figure 1. System architecture.
                        - generic [ref=e349]: A multi-agent adversarial mechanism further enhances the system’s robustness. Different LLMs, trained on diverse datasets, dynamically interact to cross-validate their outputs. To ensure unbiased and reliable responses, the system employs a reliability-based weighting mechanism that adjusts each model’s contribution based on the reliability metrics. This adversarial setup leverages the unique strengths of each LLM, reducing vulnerability to individual model biases.
                        - generic [ref=e350]: Error tracking is incorporated into each LLM through an error log, which records instances of inconsistencies. When the error count exceeds a predefined threshold, a self-reflection process is triggered, enabling the LLM to review its past mistakes and refine future responses. This mechanism fosters continuous improvement within individual models.
                        - generic [ref=e351]:
                          - text: To combine and check the outputs of different LLMs, a GPT-based summarizing model is employed. This module combines the responses from multiple models and performs additional validation. Hallucination detection is further reinforced by analyzing the variance and entropy of the generated responses. If hallucinations are identified, the system either internally corrects the response or refers it to a stronger model or human evaluator. Finally, a penalty function discourages excessive response variance and minimizes unnecessary dialogue rounds, ensuring both accuracy and efficiency.
