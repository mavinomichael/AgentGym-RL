                        - heading "4.2. Experimental Steps" [level=3] [ref=e1496]
                        - generic [ref=e1497]: This section outlines the experimental steps of our study. The first part describes the baseline setup based on LLM Agora, followed by our extensions and improvements.
                        - generic [ref=e1498]:
                          - 'heading "4.2.1. Baseline: LLM Agora" [level=4] [ref=e1499]'
                          - generic [ref=e1500]:
                            - text: Our study builds on the LLM Agora framework, which applies the multi-agent debate method introduced by Du et al. [
                            - link "32" [ref=e1501] [cursor=pointer]:
                              - /url: "#B32-applsci-15-03676"
                            - text: "]. This framework focuses on improving the quality of responses from open-source language models (LLMs) through iterative debates. The main steps are as follows:"
                          - generic [ref=e1502]: "Step 1: Initial response generation"
                          - generic [ref=e1503]: "Multiple open-source LLMs, such as Llama2, Vicuna2, and WizardLM2, are used to generate responses independently for the following tasks:"
                          - list [ref=e1505]:
                            - listitem [ref=e1506]:
                              - generic [ref=e1507]: "Math problems: Simple arithmetic operations involving six numbers."
                            - listitem [ref=e1508]:
                              - generic [ref=e1509]: "GSM8K dataset: Grade school-level math word problems."
                            - listitem [ref=e1510]:
                              - generic [ref=e1511]: "MMLU benchmark: Questions covering 57 subjects from STEM to humanities and social sciences."
                          - generic [ref=e1512]: "Step 2: Summarization of responses"
                          - generic [ref=e1513]: The responses from all models are summarized using a summarizer model, such as ChatGPT. The summary synthesizes key points from each model, removes redundancy, and serves as the input for the next round of debate.
                          - generic [ref=e1514]: "Step 3: Iterative debate"
                          - generic [ref=e1515]: "Based on the summarized response, the models refine their answers over multiple rounds:"
                          - list [ref=e1517]:
                            - listitem [ref=e1518]:
                              - generic [ref=e1519]: Each model updates its response using the summarized feedback.
                            - listitem [ref=e1520]:
                              - generic [ref=e1521]: The chain-of-thought (CoT) method is optionally applied to enhance logical reasoning and improve response quality.
                          - generic [ref=e1522]: "Step 4: Evaluation metrics"
                          - generic [ref=e1523]: "The quality of the responses is assessed using the following metrics:"
                          - list [ref=e1525]:
                            - listitem [ref=e1526]:
                              - generic [ref=e1527]: "Accuracy: Correctness of responses compared to the ground truth."
                            - listitem [ref=e1528]:
                              - generic [ref=e1529]: "Reduction in hallucination: The extent to which factual errors are reduced across debate rounds."
                            - listitem [ref=e1530]:
                              - generic [ref=e1531]: "Efficiency: Resource usage, including the total tokens and computation time."
                            - listitem [ref=e1532]:
                              - generic [ref=e1533]: "Completion time: Time taken to reach the final response."
                          - generic [ref=e1534]: "Step 5: Results and Observations"
                          - generic [ref=e1535]: The baseline results show that multi-agent debate improves factuality and reasoning in open-source models. However, the effectiveness depends on the quality of initial responses, and challenges remain in ensuring consistent improvements.
                        - generic [ref=e1536]:
                          - heading "4.2.2. Our Extensions and Improvements" [level=4] [ref=e1537]
                          - generic [ref=e1538]:
                            - text: Building upon the baseline framework of LLM Agora [
                            - link "32" [ref=e1539] [cursor=pointer]:
                              - /url: "#B32-applsci-15-03676"
                            - text: "], we introduced several enhancements to improve the performance and robustness of the multi-agent debate process. These modifications address key limitations of the baseline by incorporating dynamic weighting, consistency-based evaluations, and adaptive dataset augmentation. Below, we outline our approach and emphasize the changes compared to the baseline."
                          - generic [ref=e1540]: 1. Batch-wise inference with dynamic weighting
                          - generic [ref=e1541]: "Unlike the baseline, which processes questions uniformly, we divide the dataset into batches of 50 questions each, inspired by techniques in adaptive learning frameworks. For each batch:"
                          - list [ref=e1543]:
